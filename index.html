<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Películas - BD Local</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h1 { color: #1a73e8; margin-bottom: 25px; }
        select, button { padding: 12px; margin: 10px 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        select { width: 80%; cursor: pointer; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .btn-api { background: #34a853; }
        .btn-api:hover { background: #2d8e47; }
        .card { margin-top: 30px; padding: 20px; border: 1px solid #eee; border-radius: 10px; background: #fafafa; }
        .error { color: #d93025; background: #fce8e6; padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 Buscador de Películas</h1>
        
        <form id="formPeliculas">
            <label for="genero">Selecciona un género:</label><br>
            <select name="genero" id="genero" required>
                <option value="">-- Elige una opción --</option>
                <option value="accion">Acción</option> 
                <option value="terror">Terror</option>
                <option value="romance">Romance</option>
            </select><br>
            <button type="submit">Consultar BD Local</button>
            <button type="button" class="btn-api" onclick="buscarExterno()">Consultar API Externa</button>
        </form>

        <div id="error" class="error" style="display:none;"></div>
        <div id="resultado" class="card" style="display:none;"></div>
    </div>

    <script>
        const form = document.getElementById('formPeliculas');
        const resDiv = document.getElementById('resultado');
        const errDiv = document.getElementById('error');

        function limpiar() {
            errDiv.style.display = 'none';
            resDiv.style.display = 'none';
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            limpiar();
            const genero = new FormData(form).get('genero');

            try {
                const res = await fetch(`api/db.php?genero=${genero}`);
                if (!res.ok) throw new Error("No se encontraron resultados.");
                const data = await res.json();
                
                // Solo enviamos el título a la función render
                render(data.nombre); 
            } catch (err) {
                showErr(err.message);
            }
        };

        async function buscarExterno() {
            limpiar();
            const genero = document.getElementById('genero').value;
            if(!genero) return showErr("Por favor, selecciona un género primero.");

            try {
                const res = await fetch(`api/externo.php?genero=${genero}`);
                const data = await res.json();
                
                if(data.Response === "False") throw new Error("Sin resultados externos.");
                
                // De la API externa también solo tomamos el Título para mantener simetría
                render(data.Search[0].Title);
            } catch (e) {
                showErr("Error al conectar con el servicio de terceros.");
            }
        }

        function render(titulo) {
            resDiv.style.display = 'block';
            resDiv.innerHTML = `<h2>${titulo}</h2>`;
        }

        function showErr(msg) {
            errDiv.style.display = 'block';
            errDiv.innerText = msg;
        }
    </script>
</body>
</html>
